[pytest]
timeout = 20
timeout_method = thread
pythonpath = .
testpaths =
    tests
    runtime/tests
    scripts
python_files = test_*.py
markers =
    longrun: long-running stability coverage excluded from default pytest runs
norecursedirs =
    backup
    .git
    .venv
    venv
    build
    artifacts
    __pycache__
