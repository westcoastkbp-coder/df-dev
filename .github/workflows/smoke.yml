name: smoke-check

on:
  push:
    branches:
      - clean-codex
      - issue-*
  pull_request:
    branches:
      - clean-codex

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install PyGithub

      - run: python -c "import control.issue_router; import control.reaction_engine; print('OK')"